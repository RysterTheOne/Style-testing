<!DOCTYPE html>
<html>
    <head>

        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

        <title>
            Main
        </title>

    </head>

    <body>

        <div class="top-bar fade-in"><h1>Cupboard App</h1></div>
        <div class="center-class fade-in">

            <div class="card">

                <div class="center-title-card">
                    <div class="title-card">Measurements</div>
                </div>
                
                <div class="content-columns">
                    <div class="content-rows">
                        <div class="labels">Width</div>
                        <div class="labels">Height</div>
                        <div class="labels">Depth</div>
                        <div class="labels">Name</div>
                    </div>

                    <div class="content-rows">
                        <input type="text" class="inputs" id="width">
                        <input type="text" class="inputs" id="height">
                        <input type="text" class="inputs" id="depth">
                        <input type="text" class="inputs" id="name">
                    </div>
                </div>
            </div>

            <div class="card">
                hello
            </div>
        </div>
    </body>
</html>
